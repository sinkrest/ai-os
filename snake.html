<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #07070f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
}
canvas { display: block; }
#hint {
  margin-top: 10px;
  font-size: 11px;
  color: #1e1e2e;
  letter-spacing: 2px;
}
</style>
</head>
<body>
<canvas id="c" width="400" height="400"></canvas>
<div id="hint">WASD / ARROWS &nbsp;·&nbsp; SPACE to start</div>
<script>
const CELL = 20, COLS = 20, ROWS = 20;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── State ─────────────────────────────────────────────────────────────────────
let state, snake, dir, nextDir, food, score, hiScore, tick, particles,
    fleeing, firstFlee, flashMsg, flashAlpha, tickMs;

function init() {
  snake    = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir      = {x:1,y:0};
  nextDir  = {x:1,y:0};
  food     = spawnFood();
  score    = 0;
  tick     = 0;
  tickMs   = 140;
  particles = [];
  fleeing  = false;
  firstFlee = true;
  flashMsg  = '';
  flashAlpha = 0;
}

hiScore = parseInt(localStorage.getItem('snakeHi') || '0');

// ── Helpers ───────────────────────────────────────────────────────────────────
function wrap(v, max) { return ((v % max) + max) % max; }
function mdist(a, b)  { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
function onSnake(x, y) { return snake.some(s => s.x === x && s.y === y); }

function spawnFood() {
  let p;
  do { p = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake && onSnake(p.x, p.y));
  return p;
}

function flash(msg) { flashMsg = msg; flashAlpha = 1; }

function burst(x, y, color) {
  for (let i = 0; i < 14; i++) {
    let a = (Math.PI * 2 * i) / 14;
    let s = 1.5 + Math.random() * 2.5;
    particles.push({ x: x*CELL+CELL/2, y: y*CELL+CELL/2,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, color });
  }
}

// ── Food flee AI ──────────────────────────────────────────────────────────────
// Food moves away from the snake head every 3 game ticks when within range 6.
// It picks the move that maximises Manhattan distance from the head,
// preferring unoccupied cells. If cornered, it stays put.
function tickFood() {
  if (tick % 3 !== 0) return;
  let head = snake[0];
  let d = mdist(head, food);

  if (d > 6) { fleeing = false; return; }

  if (!fleeing && firstFlee) { flash("IT'S ALIVE!"); firstFlee = false; }
  fleeing = true;

  let moves = [
    {x: food.x+1, y: food.y},
    {x: food.x-1, y: food.y},
    {x: food.x,   y: food.y+1},
    {x: food.x,   y: food.y-1},
  ]
  .map(p => ({x: wrap(p.x, COLS), y: wrap(p.y, ROWS)}))
  .filter(p => !onSnake(p.x, p.y))
  .sort((a,b) => mdist(b,head) - mdist(a,head));

  if (moves.length) food = moves[0];
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  if (state !== 'play') return;
  tick++;

  tickFood();

  dir = nextDir;
  let head = {x: wrap(snake[0].x + dir.x, COLS), y: wrap(snake[0].y + dir.y, ROWS)};

  if (onSnake(head.x, head.y)) {
    state = 'dead';
    if (score > hiScore) { hiScore = score; localStorage.setItem('snakeHi', hiScore); }
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    burst(food.x, food.y, fleeing ? '#ff6642' : '#00ffaa');
    food = spawnFood();
    fleeing = false;
    // Speed up: every 5 points shave off 5ms, floor at 65ms
    tickMs = Math.max(65, 140 - Math.floor(score / 5) * 5);
  } else {
    snake.pop();
  }

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.88; p.vy *= 0.88;
    p.life -= 0.045;
  });

  // Flash fade
  if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - 0.015);
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function glow(color, blur)  { ctx.shadowColor = color; ctx.shadowBlur = blur; }
function noGlow()            { ctx.shadowBlur = 0; }

function drawGrid() {
  ctx.strokeStyle = '#0c0c18'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,ROWS*CELL); ctx.stroke();
  }
  for (let j = 0; j <= ROWS; j++) {
    ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(COLS*CELL,j*CELL); ctx.stroke();
  }
}

function drawSnake() {
  snake.forEach((seg, i) => {
    let t = 1 - i / snake.length;
    ctx.fillStyle = `rgba(${Math.round(20*t)}, ${Math.round(180+75*t)}, ${Math.round(90*t)}, ${0.45+0.55*t})`;
    if (i === 0) glow('#00ff88', 16); else noGlow();
    let pad = i === 0 ? 1 : 3;
    ctx.fillRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2);
  });
  noGlow();
}

function drawFood() {
  let t  = Date.now() / 1000;
  let cx = food.x*CELL + CELL/2;
  let cy = food.y*CELL + CELL/2;

  if (fleeing) {
    // Frantic red pulse
    let pulse = 0.72 + Math.sin(t * 14) * 0.18;
    let r = CELL/2 * 0.7 * pulse;
    glow('#ff3010', 22);
    ctx.fillStyle = '#ff5530';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    // Exclamation mark
    noGlow();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${CELL-4}px 'Courier New'`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('!', cx, cy - 1);
  } else {
    let pulse = 0.8 + Math.sin(t * 3) * 0.15;
    let r = CELL/2 * 0.62 * pulse;
    glow('#00ccff', 18);
    ctx.fillStyle = '#00eeff';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    // Inner highlight
    noGlow();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(cx - r*0.28, cy - r*0.28, r*0.28, 0, Math.PI*2); ctx.fill();
  }
  noGlow();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    glow(p.color, 6);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3*p.life, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1; noGlow();
}

function drawHUD() {
  ctx.textBaseline = 'top';
  ctx.font = '12px "Courier New"';
  glow('#00ff88', 6);
  ctx.fillStyle = '#00ff88';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + score, 8, 8);
  noGlow();
  ctx.fillStyle = '#22223a';
  ctx.textAlign = 'right';
  ctx.fillText('BEST ' + hiScore, COLS*CELL - 8, 8);
}

function drawFlash() {
  if (flashAlpha <= 0) return;
  ctx.globalAlpha = Math.min(1, flashAlpha * 2);
  glow('#ff4422', 20);
  ctx.fillStyle = '#ff6644';
  ctx.font = 'bold 20px "Courier New"';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(flashMsg, COLS*CELL/2, ROWS*CELL/2 - 30);
  noGlow(); ctx.globalAlpha = 1;
}

function drawTitle() {
  ctx.fillStyle = '#07070f';
  ctx.fillRect(0, 0, COLS*CELL, ROWS*CELL);
  drawGrid();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  glow('#00ff88', 30);
  ctx.font = 'bold 48px "Courier New"';
  ctx.fillStyle = '#00ff88';
  ctx.fillText('SNAKE', COLS*CELL/2, ROWS*CELL/2 - 50);

  noGlow();
  ctx.font = '12px "Courier New"';
  ctx.fillStyle = '#222238';
  ctx.fillText('WASD or ARROWS to move', COLS*CELL/2, ROWS*CELL/2 + 10);

  // Blinking start prompt
  if (Math.floor(Date.now() / 600) % 2) {
    ctx.fillStyle = '#333355';
    ctx.fillText('SPACE TO START', COLS*CELL/2, ROWS*CELL/2 + 40);
  }
}

function drawDead() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, COLS*CELL, ROWS*CELL);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  glow('#ff3030', 25);
  ctx.font = 'bold 30px "Courier New"';
  ctx.fillStyle = '#ff4444';
  ctx.fillText('GAME OVER', COLS*CELL/2, ROWS*CELL/2 - 44);
  noGlow();

  ctx.font = '14px "Courier New"';
  ctx.fillStyle = '#8888aa';
  ctx.fillText('score: ' + score, COLS*CELL/2, ROWS*CELL/2 - 10);

  if (score > 0 && score >= hiScore) {
    glow('#ffdd00', 12);
    ctx.fillStyle = '#ffee44';
    ctx.font = '13px "Courier New"';
    ctx.fillText('NEW BEST!', COLS*CELL/2, ROWS*CELL/2 + 18);
    noGlow();
  }

  if (Math.floor(Date.now() / 600) % 2) {
    ctx.font = '11px "Courier New"';
    ctx.fillStyle = '#333355';
    ctx.fillText('SPACE to play again', COLS*CELL/2, ROWS*CELL/2 + 52);
  }
}

// ── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  if (state === 'title') { drawTitle(); return; }

  ctx.fillStyle = '#07070f';
  ctx.fillRect(0, 0, COLS*CELL, ROWS*CELL);
  drawGrid();
  drawParticles();
  drawFood();
  drawSnake();
  drawHUD();
  drawFlash();

  if (state === 'dead') drawDead();
}

// ── Input ─────────────────────────────────────────────────────────────────────
const KEY_DIR = {
  ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
  KeyW:{x:0,y:-1},    KeyS:{x:0,y:1},      KeyA:{x:-1,y:0},      KeyD:{x:1,y:0},
};

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    if (state === 'title' || state === 'dead') { init(); state = 'play'; }
    return;
  }
  if (state !== 'play') return;
  let d = KEY_DIR[e.code];
  if (!d) return;
  if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
  e.preventDefault();
});

// ── Game loop (fixed timestep, visual updates every rAF) ──────────────────────
let lastTick = 0;

function loop(now) {
  requestAnimationFrame(loop);
  if (state === 'play' && now - lastTick >= tickMs) {
    lastTick = now;
    update();
  }
  draw();
}

state = 'title';
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
